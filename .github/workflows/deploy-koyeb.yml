name: Deploy Koyeb

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref to deploy"
        required: false
        default: "main"
        type: string
      public_url:
        description: "Optional override for ENVSHIELD_PUBLIC_URL"
        required: false
        default: ""
        type: string

concurrency:
  group: deploy-koyeb-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.event.workflow_run.head_branch }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Koyeb
    runs-on: ubuntu-latest
    environment: koyeb
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.event.workflow_run.head_sha }}

      - name: Install Koyeb CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh
          echo "$HOME/.koyeb/bin" >> "$GITHUB_PATH"

      - name: Verify deployment secret
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${KOYEB_TOKEN:-}" ]]; then
            echo "KOYEB_TOKEN GitHub secret is required." >&2
            exit 1
          fi

      - name: Deploy with koyeb.yaml
        env:
          KOYEB_TOKEN: ${{ secrets.KOYEB_TOKEN }}
          KOYEB_PUBLIC_URL: ${{ vars.KOYEB_PUBLIC_URL }}
          KOYEB_ORGANIZATION: ${{ vars.KOYEB_ORGANIZATION }}
          WORKFLOW_PUBLIC_URL: ${{ github.event.inputs.public_url }}
          WORKFLOW_GIT_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.git_ref || github.event.workflow_run.head_branch }}
          GITHUB_REPOSITORY_SLUG: ${{ github.repository }}
        run: |
          set -euo pipefail

          deploy_ref="${WORKFLOW_GIT_REF:-main}"
          public_url="${WORKFLOW_PUBLIC_URL:-${KOYEB_PUBLIC_URL:-}}"

          args=(
            --config koyeb.yaml
            --git "github.com/${GITHUB_REPOSITORY_SLUG}"
            --git-branch "${deploy_ref}"
          )

          if [[ -n "${public_url}" ]]; then
            args+=(--public-url "${public_url}")
          fi

          if [[ -n "${KOYEB_ORGANIZATION:-}" ]]; then
            args+=(--organization "${KOYEB_ORGANIZATION}")
          fi

          ./scripts/deploy_koyeb.sh "${args[@]}"
