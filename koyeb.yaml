# Declarative Koyeb deployment settings for EnvShield.
# This file is consumed by scripts/deploy_koyeb.sh.

app: envshield
service: envshield
repository: github.com/dennislee928/EnvShield
branch: main
builder: docker
dockerfile: Dockerfile
instance_type: nano
ports: 8080:http
routes: /:8080
checks: 8080:http:/healthz
public_url: https://envshield-wolf-alpha-3c512c3a.koyeb.app
regions: fra
organization: ""
min_scale: 1
max_scale: 1
wait_timeout: 10m
